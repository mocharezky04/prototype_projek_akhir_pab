name: projek_akhir_pab
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.5+1
  supabase_flutter: ^2.9.1
  flutter_dotenv: ^5.2.1
  flutter_local_notifications: ^18.0.1
  fl_chart: ^0.69.0
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.1
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/.env

flutter_native_splash:
  color: "#FFF4E8"
